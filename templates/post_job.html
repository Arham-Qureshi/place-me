{% extends 'base.html' %}
{% block title %}Post Job – PlaceMe{% endblock %}
{% block content %}

<div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Post New Placement Drive</h1>
    <p class="text-sm text-surface-400 mt-0.5">Create a new job opening for campus recruitment</p>
</div>

<div class="bg-white rounded-2xl shadow-sm border border-surface-200/60 p-6 max-w-xl">
    <form method="POST" action="{{ url_for('post_job') }}" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Job Role *</label>
            <input type="text" name="job_role" required placeholder="e.g. Software Developer"
                class="w-full px-4 py-2.5 rounded-xl border border-surface-200 bg-white text-sm text-gray-800 placeholder:text-surface-300 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-400 transition-all">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
            <textarea name="description" rows="3" placeholder="Brief about the role..."
                class="w-full px-4 py-2.5 rounded-xl border border-surface-200 bg-white text-sm text-gray-800 placeholder:text-surface-300 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-400 transition-all resize-none"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Package (CTC in LPA) *</label>
                <input type="number" name="package" min="1" required
                    class="w-full px-4 py-2.5 rounded-xl border border-surface-200 bg-white text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-400 transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Min CGPA</label>
                <input type="number" name="eligibility_cgpa" step="0.01" min="0" max="10" value="0"
                    class="w-full px-4 py-2.5 rounded-xl border border-surface-200 bg-white text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-400 transition-all">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Application Deadline *</label>
            <input type="date" name="deadline" required
                class="w-full px-4 py-2.5 rounded-xl border border-surface-200 bg-white text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-400 transition-all">
        </div>
        <div class="flex items-center gap-3 pt-1">
            <button type="submit"
                class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold text-white bg-brand-600 hover:bg-brand-700 shadow-sm hover:shadow transition-all duration-150">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
                Post Job
            </button>
            <a href="{{ url_for('company_dashboard') }}"
                class="px-4 py-2.5 rounded-xl text-sm font-medium text-gray-600 bg-surface-100 hover:bg-surface-200 transition-colors">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
