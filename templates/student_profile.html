{% extends 'base.html' %}
{% block title %}My Profile – PlaceMe{% endblock %}
{% block content %}

<div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">My Profile</h1>
    <p class="text-sm text-surface-400 mt-0.5">Update your academic details</p>
</div>

<div class="bg-white rounded-2xl shadow-sm border border-surface-200/60 p-6 max-w-xl">
    <form method="POST" action="{{ url_for('student_profile') }}" class="space-y-5">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">First Name *</label>
                <input type="text" name="first_name" value="{{ student.first_name }}" required
                    class="w-full px-4 py-2.5 rounded-xl border border-surface-200 bg-white text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-400 transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Last Name</label>
                <input type="text" name="last_name" value="{{ student.last_name or '' }}"
                    class="w-full px-4 py-2.5 rounded-xl border border-surface-200 bg-white text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-400 transition-all">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Roll Number</label>
            <input type="text" value="{{ student.roll_number }}" disabled
                class="w-full px-4 py-2.5 rounded-xl border border-surface-200 bg-surface-50 text-sm text-gray-400 cursor-not-allowed">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
            <input type="email" value="{{ student.email }}" disabled
                class="w-full px-4 py-2.5 rounded-xl border border-surface-200 bg-surface-50 text-sm text-gray-400 cursor-not-allowed">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Branch *</label>
                <select name="branch" required
                    class="w-full px-4 py-2.5 rounded-xl border border-surface-200 bg-white text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-400 transition-all">
                    {% for b in ['CSE','ECE','MECH','CIVIL','EEE','IT'] %}
                    <option value="{{ b }}" {% if student.branch==b %}selected{% endif %}>{{ b }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">CGPA *</label>
                <input type="number" name="cgpa" step="0.01" min="0" max="10" value="{{ student.cgpa }}" required
                    class="w-full px-4 py-2.5 rounded-xl border border-surface-200 bg-white text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-400 transition-all">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Resume Link</label>
            <input type="url" name="resume_link" value="{{ student.resume_link or '' }}"
                placeholder="Google Drive / LinkedIn URL"
                class="w-full px-4 py-2.5 rounded-xl border border-surface-200 bg-white text-sm text-gray-800 placeholder:text-surface-300 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-400 transition-all">
        </div>
        <button type="submit"
            class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold text-white bg-brand-600 hover:bg-brand-700 shadow-sm hover:shadow transition-all duration-150">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
            Save Changes
        </button>
    </form>
</div>

{% endblock %}
